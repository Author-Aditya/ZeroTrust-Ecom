spring.application.name=User_Services

server.port=8081
spring.datasource.url=${PDB_MODEL_URL}
spring.datasource.username=${PDB_USERNAME}
spring.datasource.password=${PDB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🔥 Change dialect to PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.jpa.open-in-view=false


#log
logging.file.name=logs/application.log
logging.level.root=INFO
logging.level.com.ecom.user=DEBUG